<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="本体图谱项目截图风格示意">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.side{fill:#fff}.top{fill:#fff}.line{stroke:#e2e8f0}
      .nav{font:600 18px 'IBM Plex Sans SC','PingFang SC',sans-serif;fill:#334155}
      .nav-small{font:500 14px 'IBM Plex Sans SC','PingFang SC',sans-serif;fill:#64748b}
      .title{font:800 24px 'IBM Plex Sans SC','PingFang SC',sans-serif;fill:#0f172a}
      .sub{font:500 15px 'IBM Plex Sans SC','PingFang SC',sans-serif;fill:#64748b}
      .node-title{font:800 17px 'IBM Plex Sans SC','PingFang SC',sans-serif;fill:#0f172a}
      .node-id{font:500 12px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#94a3b8}
      .prop{font:500 13px 'IBM Plex Sans SC','PingFang SC',sans-serif;fill:#334155}
      .tag{font:700 11px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#64748b}
      .edge{fill:none;stroke:#2563eb;stroke-width:3;marker-end:url(#arrow)}
      .edge-label{font:700 13px 'IBM Plex Sans SC','PingFang SC',sans-serif;fill:#1d4ed8}
    </style>
  </defs>
